services:
  postgres:
    container_name: postgres
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-wb_reviews}
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-wb_reviews}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build: .
    container_name: wb-backend
    restart: unless-stopped
    env_file:
    - .env
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-wb_reviews}
      TYPEORM_SYNCHRONIZE: "true"
      TYPEORM_LOGGING: "false"
    volumes:
      - app_output:/app/output
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  app_output: